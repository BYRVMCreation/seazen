backend:
  name: git-gateway
  branch: main

media_folder: "."
public_folder: "/"

site_url: https://your-site.netlify.app

collections:
  - name: "legal"
    label: "Legal Pages"
    files:
      - name: "privacy"
        label: "Privacy Policy"
        file: "privacy.json"
        format: json
        fields:
          - { label: "Page title", name: "title", widget: "string", default: "Privacy Policy" }
          - { label: "Last updated", name: "updated", widget: "string", default: "1 January 2025" }
          - label: "Sections"
            name: "sections"
            widget: "list"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Content", name: "content", widget: "text" }

      - name: "terms"
        label: "Terms & Conditions"
        file: "terms.json"
        format: json
        fields:
          - { label: "Page title", name: "title", widget: "string", default: "Terms & Conditions" }
          - { label: "Last updated", name: "updated", widget: "string", default: "1 January 2025" }
          - label: "Sections"
            name: "sections"
            widget: "list"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Content", name: "content", widget: "text" }

      - name: "cancellation"
        label: "Cancellation Policy"
        file: "cancellation.json"
        format: json
        fields:
          - { label: "Page title", name: "title", widget: "string", default: "Cancellation Policy" }
          - { label: "Last updated", name: "updated", widget: "string", default: "1 January 2025" }
          - label: "Sections"
            name: "sections"
            widget: "list"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Content", name: "content", widget: "text" }

  - name: "settings"
    label: "Site Settings"
    files:
      - name: "content"
        label: "Website Content"
        file: "content.json"
        format: json
        fields:

          # ── HERO ──────────────────────────────────
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Title line 1", name: "title1", widget: "string", default: "SeaZen" }
              - { label: "Title line 2", name: "title2", widget: "string", default: "Sitges" }
              - { label: "Subtitle", name: "subtitle", widget: "string", default: "Sitges, Spain — Seafront Apartment" }
              - { label: "Hero image (desktop)", name: "image", widget: "image" }
              - { label: "Hero image (mobile)", name: "imageMobile", widget: "image" }
              - { label: "CTA button text", name: "cta", widget: "string", default: "Discover the apartment" }

          # ── INTRO ─────────────────────────────────
          - label: "Intro Section"
            name: "intro"
            widget: "object"
            fields:
              - { label: "Overtitle", name: "overtitle", widget: "string", default: "The Apartment" }
              - { label: "Heading line 1", name: "heading1", widget: "string", default: "A curated retreat" }
              - { label: "Heading line 2", name: "heading2", widget: "string", default: "above the Mediterranean" }
              - { label: "Paragraph 1", name: "para1", widget: "text" }
              - { label: "Paragraph 2", name: "para2", widget: "text" }
              - label: "Key Facts"
                name: "facts"
                widget: "object"
                fields:
                  - { label: "Size", name: "size", widget: "string", default: "120 m²" }
                  - { label: "Guests", name: "guests", widget: "string", default: "4 Guests" }
                  - { label: "Bedrooms", name: "bedrooms", widget: "string", default: "2 Bedrooms" }
                  - { label: "Price from", name: "price", widget: "string", default: "€250 / night" }
                  - { label: "Beach distance", name: "beach", widget: "string", default: "50 m to beach" }
                  - { label: "View", name: "view", widget: "string", default: "Sea view" }

          # ── AMENITIES ─────────────────────────────
          - label: "Amenities Section"
            name: "amenities"
            widget: "object"
            fields:
              - { label: "Overtitle", name: "overtitle", widget: "string", default: "Everything you could need" }
              - { label: "Heading", name: "heading", widget: "string", default: "Thoughtfully equipped" }
              - label: "Amenity items"
                name: "items"
                widget: "list"
                field: { label: "Item", name: "item", widget: "string" }

          # ── THINGS TO DO ──────────────────────────
          - label: "Things To Do"
            name: "sitges"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string", default: "Sitges awaits" }
              - { label: "Subtitle", name: "subtitle", widget: "text" }
              - label: "Items"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Icon (emoji)", name: "icon", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "desc", widget: "string" }

          # ── FLOOR PLAN ────────────────────────────
          - label: "Floor Plan"
            name: "floorplan"
            widget: "object"
            fields:
              - { label: "Overtitle", name: "overtitle", widget: "string", default: "Floor Plan" }
              - { label: "Heading (e.g. 120 m² of refined space)", name: "heading", widget: "string", default: "120 m² of refined space" }
              - { label: "Description (right column)", name: "desc", widget: "text", default: "Two bedrooms, open-plan living, full kitchen, and a sea-facing wraparound terrace." }
              - { label: "Floor plan image", name: "image", widget: "image" }

          # ── GALLERY ───────────────────────────────
          - label: "Gallery"
            name: "gallery"
            widget: "object"
            fields:
              - { label: "Section title", name: "heading", widget: "string", default: "Take a closer look" }
              - label: "Photos"
                name: "images"
                widget: "list"
                fields:
                  - { label: "Image", name: "src", widget: "image" }
                  - { label: "Caption", name: "alt", widget: "string" }

          # ── REVIEWS ───────────────────────────────
          - label: "Reviews"
            name: "reviews"
            widget: "object"
            fields:
              - { label: "Section heading", name: "heading", widget: "string", default: "What our guests say" }
              - label: "Reviews"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Location", name: "location", widget: "string" }
                  - { label: "Date", name: "date", widget: "string" }
                  - { label: "Stars (1-5)", name: "stars", widget: "number", min: 1, max: 5, default: 5 }
                  - { label: "Review text", name: "text", widget: "text" }

          # ── BOOKING ───────────────────────────────
          - label: "Booking Info"
            name: "booking"
            widget: "object"
            fields:
              - { label: "Minimum stay", name: "minStay", widget: "string", default: "3 nights" }
              - { label: "Check-in from", name: "checkin", widget: "string", default: "15:00" }
              - { label: "Check-out before", name: "checkout", widget: "string", default: "11:00" }
              - { label: "Pets policy", name: "pets", widget: "string", default: "not permitted" }
              - { label: "Smoking policy", name: "smoking", widget: "string", default: "outside only" }

          # ── CONTACT ───────────────────────────────
          - label: "Contact"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Phone", name: "phone", widget: "string", default: "+34 600 000 000" }
              - { label: "Email", name: "email", widget: "string", default: "hello@seazen.com" }
              - { label: "Instagram handle", name: "instagram", widget: "string", default: "@seazen.sitges" }
              - { label: "Instagram URL", name: "instagramUrl", widget: "string", default: "https://instagram.com" }

          # ── NEWSLETTER ────────────────────────────
          - label: "Newsletter / CTA"
            name: "newsletter"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string", default: "Stay in the loop" }
              - { label: "Subtext", name: "sub", widget: "string", default: "Be the first to hear about availability and special offers." }

          # ── FOOTER ────────────────────────────────
          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Copyright text", name: "copy", widget: "string", default: "© 2025 SeaZen. All rights reserved." }
