backend:
  name: git-gateway
  branch: main

media_folder: "uploads"
public_folder: "/uploads"

site_url: https://your-site.netlify.app

collections:
  - name: "legal"
    label: "Legal Pages"
    files:
      - name: "privacy"
        label: "Privacy Policy"
        file: "privacy.json"
        format: json
        fields:
          - { label: "Page title", name: "title", widget: "string", default: "Privacy Policy" }
          - { label: "Last updated", name: "updated", widget: "string", default: "1 January 2026" }
          - label: "Sections"
            name: "sections"
            widget: "list"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Content", name: "content", widget: "text" }

      - name: "terms"
        label: "Terms & Conditions"
        file: "terms.json"
        format: json
        fields:
          - { label: "Page title", name: "title", widget: "string", default: "Terms & Conditions" }
          - { label: "Last updated", name: "updated", widget: "string", default: "1 January 2026" }
          - label: "Sections"
            name: "sections"
            widget: "list"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Content", name: "content", widget: "text" }

      - name: "cancellation"
        label: "Cancellation Policy"
        file: "cancellation.json"
        format: json
        fields:
          - { label: "Page title", name: "title", widget: "string", default: "Cancellation Policy" }
          - { label: "Last updated", name: "updated", widget: "string", default: "1 January 2026" }
          - label: "Sections"
            name: "sections"
            widget: "list"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Content", name: "content", widget: "text" }

  - name: "settings"
    label: "Site Settings"
    files:
      - name: "content"
        label: "Website Content"
        file: "content.json"
        format: json
        fields:

          # ── NAVIGATION ────────────────────────────
          - label: "Navigation"
            name: "nav"
            widget: "object"
            fields:
              - { label: "Logo image", name: "logo", widget: "image" }
              - { label: "Menu: The Apartment", name: "apartment", widget: "string", default: "The Apartment" }
              - { label: "Menu: Amenities", name: "amenities", widget: "string", default: "Amenities" }
              - { label: "Menu: Gallery", name: "gallery", widget: "string", default: "Gallery" }
              - { label: "Menu: Floor Plan", name: "floorplan", widget: "string", default: "Floor Plan" }
              - { label: "Menu: Book button", name: "book", widget: "string", default: "Book Now" }

          # ── HERO ──────────────────────────────────
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Title line 1", name: "title1", widget: "string" }
              - { label: "Title line 2 (normal, not italic)", name: "title2", widget: "string" }
              - { label: "Subtitle (above title)", name: "subtitle", widget: "string" }
              - { label: "Subtext (below title)", name: "subtext", widget: "text" }
              - { label: "Hero image (desktop)", name: "image", widget: "image" }
              - { label: "Hero image (mobile)", name: "imageMobile", widget: "image" }
              - { label: "CTA button text", name: "cta", widget: "string" }

          # ── INTRO ─────────────────────────────────
          - label: "Intro Section"
            name: "intro"
            widget: "object"
            fields:
              - { label: "Overtitle", name: "overtitle", widget: "string" }
              - { label: "Heading line 1", name: "heading1", widget: "string" }
              - { label: "Heading line 2", name: "heading2", widget: "string" }
              - { label: "Paragraph 1", name: "para1", widget: "text" }
              - { label: "Paragraph 2", name: "para2", widget: "text" }
              - label: "Key Facts"
                name: "facts"
                widget: "object"
                fields:
                  - { label: "Size Interior", name: "size", widget: "string", default: "100 m²" }
                  - { label: "Guests", name: "guests", widget: "string", default: "2 Guests" }
                  - { label: "Bedrooms", name: "bedrooms", widget: "string", default: "1 Bedroom" }
                  - { label: "Terrace", name: "terrace", widget: "string", default: "38 m²" }
                  - { label: "Beach distance", name: "beach", widget: "string" }
                  - { label: "View", name: "view", widget: "string" }

          # ── STRIPS ────────────────────────────────
          - label: "Strip Banner Images"
            name: "strips"
            widget: "object"
            fields:
              - { label: "Strip 1 image (after intro)", name: "strip1", widget: "image" }
              - { label: "Strip 2 image (after amenities)", name: "strip2", widget: "image" }

          # ── AMENITIES ─────────────────────────────
          - label: "Amenities Section"
            name: "amenities"
            widget: "object"
            fields:
              - { label: "Overtitle", name: "overtitle", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - label: "Slideshow photos"
                name: "photos"
                widget: "list"
                field: { label: "Photo", name: "photo", widget: "image" }
              - label: "Amenity items"
                name: "items"
                widget: "list"
                field: { label: "Item", name: "item", widget: "string" }

          # ── SITGES ────────────────────────────────
          - label: "Things To Do (Sitges)"
            name: "sitges"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "text" }
              - label: "Items"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Icon (emoji)", name: "icon", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "desc", widget: "text" }

          # ── FLOOR PLAN ────────────────────────────
          - label: "Floor Plan"
            name: "floorplan"
            widget: "object"
            fields:
              - { label: "Overtitle", name: "overtitle", widget: "string", default: "Floor Plan" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }
              - { label: "Floor plan image", name: "image", widget: "image", required: false }

          # ── GALLERY ───────────────────────────────
          - label: "Gallery"
            name: "gallery"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - label: "Images"
                name: "images"
                widget: "list"
                fields:
                  - { label: "Image", name: "src", widget: "image" }
                  - { label: "Alt text", name: "alt", widget: "string" }

          # ── REVIEWS ───────────────────────────────
          - label: "Guest Reviews"
            name: "reviews"
            widget: "object"
            fields:
              - { label: "Section heading", name: "heading", widget: "string" }
              - label: "Review cards"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Guest name", name: "name", widget: "string" }
                  - { label: "Location", name: "location", widget: "string" }
                  - { label: "Date", name: "date", widget: "string" }
                  - { label: "Stars (1–5)", name: "stars", widget: "number", default: 5 }
                  - { label: "Review text", name: "text", widget: "text" }

          # ── BOOKING ───────────────────────────────
          - label: "Booking Section"
            name: "booking"
            widget: "object"
            fields:
              - { label: "Section heading", name: "heading", widget: "string", default: "Reserve SeaZen" }
              - { label: "Description text", name: "desc", widget: "text" }
              - { label: "Minimum stay", name: "minStay", widget: "string", default: "5 nights" }
              - { label: "Check-in time", name: "checkin", widget: "string", default: "15:00" }
              - { label: "Check-out time", name: "checkout", widget: "string", default: "11:00" }
              - { label: "Pets policy", name: "pets", widget: "string", default: "not permitted" }
              - { label: "Smoking policy", name: "smoking", widget: "string", default: "not permitted" }
              - label: "Carousel photos"
                name: "photos"
                widget: "list"
                field: { label: "Photo", name: "photo", widget: "image" }

          # ── LODGIFY ───────────────────────────────
          - label: "Lodgify Widget"
            name: "lodgify"
            widget: "object"
            fields:
              - { label: "Rental ID", name: "rentalId", widget: "string" }
              - { label: "Website ID", name: "websiteId", widget: "string" }
              - { label: "Slug", name: "slug", widget: "string" }
              - { label: "Language code", name: "language", widget: "string", default: "en" }

          # ── NEWSLETTER ────────────────────────────
          - label: "Newsletter Section"
            name: "newsletter"
            widget: "object"
            fields:
              - { label: "Overtitle", name: "overtitle", widget: "string", default: "Stay in touch" }
              - { label: "Subtext", name: "sub", widget: "text" }
              - { label: "Email field placeholder", name: "emailPlaceholder", widget: "string", default: "Email address" }
              - { label: "Subscribe button label", name: "buttonLabel", widget: "string", default: "Subscribe" }

          # ── CONTACT ───────────────────────────────
          - label: "Contact"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Phone", name: "phone", widget: "string" }
              - { label: "Email", name: "email", widget: "string" }

          # ── FOOTER ────────────────────────────────
          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Logo image (white version)", name: "logo", widget: "image" }
              - { label: "Copyright text", name: "copy", widget: "string", default: "© 2026 SeaZen. All rights reserved." }
